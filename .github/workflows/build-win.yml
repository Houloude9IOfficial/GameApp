name: Build GameApp installer

on:
  push:
    tags:
      - "v*"
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Optional: pre-build (your script also builds, but this keeps logs clearer)
      - name: Build app (main + preload + renderer)
        run: npm run build

      - name: Build installer (GameLauncher_Setup.exe)
        run: npm run build:installer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GameApp-release
          path: |
            release/**
