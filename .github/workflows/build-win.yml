name: Build GameApp installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app (main + preload + renderer)
        run: npm run build

      - name: Build installer
        run: npm run build:installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameApp-installer
          path: release/**
